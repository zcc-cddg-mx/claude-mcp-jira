services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18000:8000"
    env_file:
      - .env
    environment:
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - JIRA_TIMEOUT=30
      - APP_ENV=prod
    volumes:
      - ./logs:/app/logs

  mcp:
    build:
      context: .
      dockerfile: jira_mcp/Dockerfile
    ports:
      - "18001:8001"
    env_file:
      - .env
    environment:
      - SERVICE_URL=http://service:8000
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./logs:/app/logs
    depends_on:
      - service

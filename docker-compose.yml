services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - audit_log:/app

  mcp:
    build:
      context: .
      dockerfile: jira_mcp/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - SERVICE_URL=http://service:8000
    depends_on:
      - service

volumes:
  audit_log:
